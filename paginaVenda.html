<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { background-color: #121212; color: #e0e0e0; font-family: 'Roboto', sans-serif; padding: 20px; text-align: center; }
    .card { background-color: #1e1e1e; padding: 20px; border-radius: 10px; max-width: 400px; margin: 0 auto; border: 1px solid #333; }
    h2 { color: #00e676; margin-top: 0; }
    .flight-info { background: #2c2c2c; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
    input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #444; background: #333; color: white; font-size: 16px; }
    button { background-color: #d50000; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    button:hover { background-color: #b71c1c; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card" id="telaForm">
    <h2>💼 Vender Milhas</h2>
    <p>Ofertar lote para esta emissão:</p>
    
    <div class="flight-info">
      <strong><?= prog ?></strong><br>
      🛫 <?= orig ?> ➡ 🛬 <?= dest ?>
    </div>

    <form id="formVenda" onsubmit="enviarOferta(event)">
      <input type="hidden" name="programa" value="<?= prog ?>">
      <input type="hidden" name="origem" value="<?= orig ?>">
      <input type="hidden" name="destino" value="<?= dest ?>">
      <input type="hidden" name="linkRef" value="<?= link ?>">

      <input type="text" name="nome" placeholder="Seu Nome" required>
      <input type="tel" name="zap" placeholder="Seu WhatsApp (DDD+Num)" required>
      
      <div style="display:flex; gap:10px;">
        <input type="number" name="qtd" placeholder="Qtd Milhas" required>
        <input type="text" name="vpm" placeholder="Valor p/ 1k (Ex: 22,50)" required>
      </div>

      <button type="submit" id="btnEnviar">ENVIAR PROPOSTA</button>
    </form>
  </div>

  <div class="card hidden" id="telaSucesso">
    <h2>✅ Oferta Enviada!</h2>
    <p>Recebemos sua proposta.</p>
    <p>Se o valor for aprovado, nossa equipe entrará em contato pelo WhatsApp.</p>
  </div>

  <script>
    function enviarOferta(e) {
      e.preventDefault();
      var btn = document.getElementById('btnEnviar');
      btn.innerHTML = "Enviando...";
      btn.disabled = true;

      google.script.run.withSuccessHandler(function(res) {
        if(res.success) {
          document.getElementById('telaForm').classList.add('hidden');
          document.getElementById('telaSucesso').classList.remove('hidden');
        } else {
          alert("Erro: " + res.erro);
          btn.innerHTML = "Tentar Novamente";
          btn.disabled = false;
        }
      }).processarOfertaVenda(document.getElementById('formVenda'));
    }
  </script>
</body>
</html>
